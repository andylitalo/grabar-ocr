apiVersion: v1
kind: ConfigMap
metadata:
  name: grabar-postgres-init-scripts
  namespace: grabar
data:
  01_schema.sql: |
    -- Core translation record
    CREATE TABLE IF NOT EXISTS translations (
        id              BIGSERIAL PRIMARY KEY,
        source_pdf      TEXT        NOT NULL,          -- GCS path to raw PDF
        page_number     INTEGER     NOT NULL,
        line_number     INTEGER     NOT NULL,
        image_gcs_uri   TEXT        NOT NULL,          -- GCS path to line-crop image
        grabar_text     TEXT        NOT NULL,          -- Raw TrOCR output (Classical Armenian)
        english_text    TEXT,                          -- LLM translation
        model_version   TEXT        NOT NULL,          -- TrOCR checkpoint used
        llm_model       TEXT,                          -- e.g. 'claude-3-5-sonnet-20241022'
        cer_score       REAL,                          -- Character Error Rate if ground truth available
        created_at      TIMESTAMPTZ NOT NULL DEFAULT NOW(),
        updated_at      TIMESTAMPTZ NOT NULL DEFAULT NOW()
    );

    -- Optional: store raw book metadata
    CREATE TABLE IF NOT EXISTS source_books (
        id          BIGSERIAL PRIMARY KEY,
        title       TEXT        NOT NULL,
        author      TEXT,
        year        INTEGER,
        language    TEXT        DEFAULT 'Grabar',
        gcs_prefix  TEXT        NOT NULL UNIQUE,      -- GCS folder path
        total_pages INTEGER,
        created_at  TIMESTAMPTZ NOT NULL DEFAULT NOW()
    );

    -- Foreign key linking translations to books
    ALTER TABLE translations
        ADD COLUMN IF NOT EXISTS book_id BIGINT REFERENCES source_books(id);

    -- Indexes for mobile app query patterns
    CREATE INDEX IF NOT EXISTS idx_translations_book_page
        ON translations (book_id, page_number, line_number);

    CREATE INDEX IF NOT EXISTS idx_translations_grabar_fts
        ON translations USING gin(to_tsvector('simple', grabar_text));

    CREATE INDEX IF NOT EXISTS idx_translations_english_fts
        ON translations USING gin(to_tsvector('english', coalesce(english_text, '')));

    -- Trigger to auto-update updated_at
    CREATE OR REPLACE FUNCTION update_updated_at()
    RETURNS TRIGGER AS $$
    BEGIN
        NEW.updated_at = NOW();
        RETURN NEW;
    END;
    $$ LANGUAGE plpgsql;

    CREATE TRIGGER translations_updated_at
        BEFORE UPDATE ON translations
        FOR EACH ROW EXECUTE FUNCTION update_updated_at();
